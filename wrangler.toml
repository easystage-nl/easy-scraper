name = "easy-stage-api"
main = "src/index.ts"
compatibility_date = "2026-04-01"

# JSON API served on its own subdomain. The "easystage.nl" zone must already be
# in this Cloudflare account; `custom_domain = true` provisions the route + SSL.
# The dashboard frontend is a separate worker (easy-dash repo) on easystage.nl.
routes = [
  { pattern = "api.easystage.nl", custom_domain = true },
]

# Poll every 10 min (matches the upstream Front-Door s-maxage=600).
[triggers]
crons = ["*/10 * * * *"]

# D1 — create once with `wrangler d1 create stagemarkt`, then paste the id here.
[[d1_databases]]
binding = "stagemarkt"
database_name = "stagemarkt"
database_id = "5018a4a1-39ab-49b0-ac33-549f5b766031"

# Search query + runtime config. Edit and redeploy to track a different query.
[vars]
SITE_ID         = "STAGEMARKT"
NIVEAU          = "4"
TYPE            = "1"
RANGE_KM        = "1000"
CREBOCODE       = "25998"          # Software developer
PLAATS_POSTCODE = "Warnsveld"
BUITENLAND      = "false"
DISCORD_COLOR   = "5793266"        # decimal; 0x5865F2 = blurple
CORS_ORIGIN     = "https://easystage.nl"

# Secrets (set via `wrangler secret put`):
#   DISCORD_WEBHOOK_URL — full webhook URL incl. /api/webhooks/<id>/<token>
